# Java CI/CD Pipeline with Maven
# Covers: Continuous Integration, Continuous Inspection (SonarCloud), Continuous Deployment
name: Java CI with Maven

on:
  push:
    branches: ["develop", "main", "feature/**"]
  pull_request:
    branches: ["develop", "main", "feature/**"]

jobs:

  # JOB 1 — BUILD & TEST (Continuous Integration + Testing)

  build:
    name: "⚙️ Build & Test"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Resolve dependencies
        run: mvn -B dependency:go-offline --file pom.xml

      # ── Continuous Integration ──
      - name: Build and Compile
        run: mvn -B clean package -DskipTests --file pom.xml

      # ── Continuous Testing ──
      - name: Run tests
        run: mvn -B test --file pom.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/
          retention-days: 7

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: target/*.jar
          retention-days: 1

      - name: Update dependency graph
        uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6

      # ── Continuous Inspection (SonarCloud) ──
      - name: Analyze with SonarCloud
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.ESPORT_GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.ESPORT_SONAR_TOKEN }}
        run: |
          mvn -B verify sonar:sonar \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.organization=fathirrizky \
            -Dsonar.projectKey=M-fathirizky_CICD_E-Sport_MKEPL


  # JOB 2 — DEPLOY (Continuous Deployment)

  deploy:
    name: "🚀 Publish to GitHub Packages"
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven
          server-id: github
          settings-path: ${{ github.workspace }}

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: target/

      # ── Continuous Deployment ──
      - name: Publish to GitHub Packages
        run: mvn -B deploy -DskipTests -s $GITHUB_WORKSPACE/settings.xml --file pom.xml
        env:
          GITHUB_TOKEN: ${{ secrets.ESPORT_GITHUB_TOKEN }}
